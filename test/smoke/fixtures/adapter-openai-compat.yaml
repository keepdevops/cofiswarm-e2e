# Minimal adapter config for the observer presence smoke test. The adapter only needs a listen
# address (distinct from the harness ports 14222/15555/18016 and the other fixtures' 18020-18021);
# dispatch_url/slot_manager_url are never called by the test.
adapter: openai-compat
listen: ":18022"
dispatch_url: "http://127.0.0.1:1"
slot_manager_url: "http://127.0.0.1:1"
upstream_type: stub
