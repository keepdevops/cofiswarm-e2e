# Minimal mode-relay config for the observer presence smoke test. The relay only needs
# dispatch_url + slot_manager_url present to boot (they are never called by the test) and a
# listen address distinct from the smoke harness ports (14222/15555/18016).
mode: cascade
listen: ":18020"
dispatch_url: "http://127.0.0.1:1"
slot_manager_url: "http://127.0.0.1:1"
